{% extends 'base.html' %}
{% block title %}Forgot Password - IGNITE{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Reset Password</h2>
    <p style="text-align: center; margin-bottom: 1rem;">Enter your college email to receive OTP</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">College Email</label>
            {{ form.email }}
            {% if form.email.errors %}
                <div class="error-text">{{ form.email.errors }}</div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send OTP</button>
    </form>
    
    <div style="text-align: center; margin-top: 1rem;">
        <a href="{% url 'accounts:login' %}">Back to Login</a>
    </div>
</div>
{% endblock %}
