{% extends 'base.html' %}
{% block title %}Verify OTP - IGNITE{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Verify Your Email</h2>
    <p style="text-align: center; margin-bottom: 1rem;">We've sent a verification code to <strong>{{ email }}</strong></p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="otp">Enter 6-Digit OTP</label>
            <input type="text" name="otp" class="form-control" maxlength="6" required placeholder="123456">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Verify Email</button>
    </form>
    
    <div style="text-align: center; margin-top: 1rem;">
        <a href="?resend=1">Resend OTP</a>
        <span style="margin: 0 10px">|</span>
        <a href="{% url 'accounts:register' %}">Change Email</a>
    </div>
</div>
{% endblock %}
